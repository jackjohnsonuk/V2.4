# ########################################
# ########################################
# # Hotend
# ########################################
# ########################################

# ########################################
# # Extruder
# ########################################

[extruder]
rotation_distance: 4.58914264527
microsteps: 16
full_steps_per_rotation: 200

# ########################################
# # MPC Control
# ########################################

# control: pid
# pid_Kp=19.888 
# pid_Ki=1.764 
# pid_Kd=56.061

# # control: mpc
# # heater_power: 901
# # cooling_fan: fan
# # ambient_temp_sensor: temperature_sensor cartographer_coil
# # filament_diameter: 1.75
# # filament_density: 1.20
# # filament_heat_capacity: 1.8 
# # target_reach_time: 2.0
# # smoothing: 0.7
# # min_ambient_change: 3
# # steady_state_rate: 1

control: mpc
heater_power: 100  
cooling_fan: fan
filament_diameter: 1.75
filament_density: 1.07
filament_heat_capacity: 1.8 

# ########################################
# # Nozzle
# ########################################

nozzle_diameter: 0.5
filament_diameter: 1.750

max_extrude_only_distance: 350
max_extrude_only_velocity: 120
max_extrude_only_accel: 10000

min_temp: 0
max_temp: 350

step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
heater_pin: PA0
sensor_type: PT1000
sensor_pin: PF3

min_extrude_temp: 25
max_extrude_cross_section: 50
pressure_advance_smooth_time: 0.02


[verify_heater extruder]
max_error: 180
check_gain_time: 45
hysteresis: 5
heating_gain: 2

# [firmware_retraction]
# retract_speed: 30
# unretract_extra_length: 0
# unretract_speed: 30
# retract_length: 0.3

[tmc2209 extruder]
uart_pin: PF2
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0
interpolate: False

