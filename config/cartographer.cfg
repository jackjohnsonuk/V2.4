########################################
# Scanner
########################################
########################################

#####################################################################
# Scanner
#####################################################################

[scanner]
serial: /dev/serial/by-id/usb-Cartographer_614e_1D0038000A43304253373820-if00
is_non_critical: True
x_offset: 20.0
#   X offset of cartographer from the nozzle.
y_offset: 0.0
# #   Y offset of cartographer from the nozzle.
calibration_method: touch 
sensor: cartographer
sensor_alt: carto ## allows use of shorter commands. ie CARTO_TOUCH instead of CARTOGRAPHER_TOUCH
scanner_touch_z_offset: 0.20 # instead of having it in your print start - touch only, this will be added to the offset at the end of every successful CARTO_TOUCH
backlash_comp: 0.00756
#####################################################################
# 	Input Shaper
#####################################################################
    
[adxl345]
cs_pin: scanner:PA3
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
    155, 172, 20
accel_per_hz: 150