########################################
########################################
# Y Axis
########################################
########################################

########################################
# Stepper x - Front Left - Motor 1
########################################

[stepper_x1]
##	in M1 position
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
microsteps: 32
rotation_distance: 40

########################################
# Driver x - Front Left - Motor 1
########################################

[tmc2209 stepper_x1] 
uart_pin: PD11
diag_pin: PG9
interpolate: true
run_current: 1.5
sense_resistor: 0.110

home_current:0.01
current_change_dwell_time: 1

driver_TBL: 0
driver_TOFF: 2
driver_HSTRT: 3
driver_HEND: 6

# ########################################
# # Stepper x1  - Back Right - Motor 2_1
# ########################################

[stepper_x]
##	in M2_1 position
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
microsteps: 32
rotation_distance: 40

full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper

position_max: 335
homing_speed: 150 

position_endstop: 0
endstop_pin: tmc2209_stepper_x:virtual_endstop
homing_retract_dist: 30



# ########################################
# # Driver x1  - Back Right - Motor 2_1
# ########################################

[tmc2209 stepper_x] 
uart_pin: PC6
diag_pin: PG10
interpolate: true
run_current: 1.5
sense_resistor: 0.110

driver_SGTHRS: 80  # 255 is most sensitive value, 0 is least sensitive
home_current: 1.5
current_change_dwell_time: 1

driver_TBL: 0
driver_TOFF: 2
driver_HSTRT: 3
driver_HEND: 6

########################################
########################################
# Y Axis
########################################
########################################

########################################
# Stepper y - Front Right - Motor 0
########################################

[stepper_y1]
##	in M0 position
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 32


# ########################################
# # Driver y - Front Right - Motor 0
# ########################################

[tmc2209 stepper_y1] 
uart_pin: PC4
diag_pin: PG6
interpolate: true
run_current: 1.5
sense_resistor: 0.110

home_current:0.01
current_change_dwell_time: 1

driver_TBL: 0
driver_TOFF: 2
driver_HSTRT: 3
driver_HEND: 6

# ########################################
# # Stepper y1 - Back Left - Motor 3
# ########################################

[stepper_y]
##	in M3 position
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA2
microsteps: 32
rotation_distance: 40

full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper

position_max: 335
homing_speed: 150 
position_min: -29
position_endstop: -29
endstop_pin: tmc2209_stepper_y:virtual_endstop
homing_retract_dist: 30

# ########################################
# # Driver y1 - Back Left - Motor 3
# ########################################

[tmc2209 stepper_y] 
uart_pin: PC7
diag_pin: PG11
interpolate: true
run_current: 1.5
sense_resistor: 0.110


driver_SGTHRS: 150  # 255 is most sensitive value, 0 is least sensitive
home_current: 1.5
current_change_dwell_time: 1

driver_TBL: 0
driver_TOFF: 2
driver_HSTRT: 3
driver_HEND: 6

########################################
########################################
# Z Axis
########################################
########################################

########################################
# Stepper z (Front Right) - first postion
########################################

[stepper_z3]
## In Front Right - First Position
step_pin: skr:gpio14
dir_pin: !skr:gpio13
enable_pin: !skr:gpio15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32


########################################
# Driver z (Front Right) - first postion
########################################

[tmc2209 stepper_z3]
uart_pin: skr:gpio9
tx_pin: skr:gpio8
uart_address: 3
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

########################################
# Stepper z1 (Front Left) - second postion
########################################

[stepper_z]
## In Front Left - Second Position
step_pin: skr:gpio11
dir_pin: skr:gpio10
enable_pin: !skr:gpio12
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

position_min: -10
position_max: 310
homing_speed: 8
second_homing_speed: 3

# # Cartographer
endstop_pin: probe:z_virtual_endstop # use cartographer as virtual endstop
homing_retract_dist: 0 # cartographer needs this to be set to 0
# endstop_pin: PG10
# position_endstop:0

# ########################################
# # Driver z1 (Front Left) - second position
# ########################################

[tmc2209 stepper_z]
uart_pin: skr:gpio9
tx_pin: skr:gpio8
uart_address: 0
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# ########################################
# # Stepper z2 (Back Right) - third position
# ########################################

[stepper_z2]
## In Back Right - Third Position
step_pin: skr:gpio6
dir_pin: skr:gpio5
enable_pin: !skr:gpio7
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

########################################
# Drivers z2 (Back Right) - third position
########################################

[tmc2209 stepper_z2]
uart_pin: skr:gpio9
tx_pin: skr:gpio8
uart_address: 2
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# ########################################
# # Stepper z3 (Back Left) - fourth position
# ########################################

[stepper_z1]
## In Back Left - Fourth Position
step_pin: skr:gpio19
dir_pin: skr:gpio28
enable_pin: !skr:gpio2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

# ########################################
# # Drivers z3 (Back Left) - fourth position
# ########################################

[tmc2209 stepper_z1]
uart_pin: skr:gpio9
tx_pin: skr:gpio8
uart_address: 1
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

########################################
########################################
# Fans
########################################
########################################

# #######################################
# 4010 Fans over 2209's
# #######################################

[multi_pin controller_fans]
pins: PA8, PE5


[controller_fan Controller]
pin: multi_pin:controller_fans
max_power: 1
shutdown_speed: 0
kick_start_time: 0.1
off_below: 0.10
stepper: stepper_x, stepper_x1, stepper_y, stepper_y1

