########################################
########################################
# Constants
########################################
########################################

[constants]

########################################
# A/B Axis
########################################

## Stepper/Driver homing settings
interpolate_ab: true
sense_resistor_ab: 0.022
rotation_distance_ab: 40
microsteps_ab: 32
full_steps_per_rotation_ab: 200
run_current_ab: 1.5

##	Primary Stepper/Driver homing settings
homing_speed_ab: 150
homing_current_main_ab: 0.8

##	Secondary Stepper/Driver settings
homing_current_secondary_ab: 0.1

##	Generic Pins for SPI
spi_software_mosi_pin_ab: PA7
spi_software_miso_pin_ab: PA6
spi_software_sclk_pin_ab: PA5

##	Stepper Driver Control
driver_TBL_ab: 0
driver_TOFF_ab: 8
driver_HSTRT_ab: 6
driver_HEND_ab: 6
driver_TPFD_ab: 4



########################################
########################################
# Y Axis
########################################
########################################

########################################
# Stepper x - Front Left - Motor 1
########################################

[stepper_x1]
##	Stepper Specific Pins
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15

## Stepper/Driver homing settings
rotation_distance: ${constants.rotation_distance_ab}
microsteps: ${constants.microsteps_ab}
full_steps_per_rotation: ${constants.full_steps_per_rotation_ab}

########################################
# Driver x - Front Left - Motor 1
########################################

[tmc5160 stepper_x1] 
##	Stepper Specific Pins
cs_pin: PD11
diag1_pin: ^!PG9

##	Generic Pins for SPI
spi_software_mosi_pin: ${constants.spi_software_mosi_pin_ab}
spi_software_miso_pin: ${constants.spi_software_miso_pin_ab}
spi_software_sclk_pin: ${constants.spi_software_sclk_pin_ab}

## Stepper/Driver homing settings
interpolate: ${constants.interpolate_ab}
run_current: ${constants.run_current_ab}
sense_resistor: ${constants.sense_resistor_ab}

##	Secondary Stepper/Driver settings
home_current: ${constants.homing_current_secondary_ab}

##	Stepper Driver Control
driver_TBL: ${constants.driver_TBL_ab}
driver_TOFF: ${constants.driver_TOFF_ab}
driver_HSTRT: ${constants.driver_HSTRT_ab}
driver_HEND: ${constants.driver_HEND_ab}
driver_TPFD: ${constants.driver_TPFD_ab}


# ########################################
# # Stepper x1  - Back Right - Motor 2_1
# ########################################

[stepper_x]
##	Stepper Specific Pins
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5

## Stepper/Driver homing settings
rotation_distance: ${constants.rotation_distance_ab}
microsteps: ${constants.microsteps_ab}
full_steps_per_rotation: ${constants.full_steps_per_rotation_ab}

##	Primary Stepper/Driver homing settings
homing_speed: ${constants.homing_speed_ab} 
endstop_pin: tmc5160_stepper_x:virtual_endstop
homing_retract_dist: 30

##	Primary Stepper/Driver positional settings
position_endstop: 0
position_max: 335

# ########################################
# # Driver x1  - Back Right - Motor 2_1
# ########################################

[tmc5160 stepper_x] 
##	Stepper Specific Pins
cs_pin: PC6
diag1_pin: ^!PG10

##	Generic Pins for SPI
spi_software_mosi_pin: ${constants.spi_software_mosi_pin_ab}
spi_software_miso_pin: ${constants.spi_software_miso_pin_ab}
spi_software_sclk_pin: ${constants.spi_software_sclk_pin_ab}

## Stepper/Driver homing settings
interpolate: ${constants.interpolate_ab}
run_current: ${constants.run_current_ab}
sense_resistor: ${constants.sense_resistor_ab}

##	Primary Stepper/Driver homing settings
home_current: ${constants.homing_current_main_ab}

##	Stepper Driver Control
driver_TBL: ${constants.driver_TBL_ab}
driver_TOFF: ${constants.driver_TOFF_ab}
driver_HSTRT: ${constants.driver_HSTRT_ab}
driver_HEND: ${constants.driver_HEND_ab}
driver_TPFD: ${constants.driver_TPFD_ab}

##	Primary Stepper/Driver homing settings
driver_SGT: 1  # -64 is most sensitive value, 63 is least sensitive

########################################
########################################
# Y Axis
########################################
########################################

########################################
# Stepper y - Front Right - Motor 0
########################################

[stepper_y1]
##	Stepper Specific Pins
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14

## Stepper/Driver homing settings
rotation_distance: ${constants.rotation_distance_ab}
microsteps: ${constants.microsteps_ab}
full_steps_per_rotation: ${constants.full_steps_per_rotation_ab}

# ########################################
# # Driver y - Front Right - Motor 0
# ########################################

[tmc5160 stepper_y1] 
##	Stepper Specific Pins
cs_pin: PC4
diag1_pin: ^!PG6

##	Generic Pins for SPI
spi_software_mosi_pin: ${constants.spi_software_mosi_pin_ab}
spi_software_miso_pin: ${constants.spi_software_miso_pin_ab}
spi_software_sclk_pin: ${constants.spi_software_sclk_pin_ab}

## Stepper/Driver homing settings
interpolate: ${constants.interpolate_ab}
run_current: ${constants.run_current_ab}
sense_resistor: ${constants.sense_resistor_ab}

##	Secondary Stepper/Driver settings
home_current: ${constants.homing_current_secondary_ab}

##	Stepper Driver Control
driver_TBL: ${constants.driver_TBL_ab}
driver_TOFF: ${constants.driver_TOFF_ab}
driver_HSTRT: ${constants.driver_HSTRT_ab}
driver_HEND: ${constants.driver_HEND_ab}
driver_TPFD: ${constants.driver_TPFD_ab}



# ########################################
# # Stepper y1 - Back Left - Motor 3
# ########################################

[stepper_y]
###	Stepper Specific Pins
step_pin: PG4
dir_pin: PC1
enable_pin: !PA2

## Stepper/Driver homing settings
rotation_distance: ${constants.rotation_distance_ab}
microsteps: ${constants.microsteps_ab}
full_steps_per_rotation: ${constants.full_steps_per_rotation_ab}

##	Primary Stepper/Driver homing settings
homing_speed: ${constants.homing_speed_ab} 
endstop_pin: tmc5160_stepper_y:virtual_endstop
homing_retract_dist: 30

##	Primary Stepper/Driver positional settings
position_min: -29
position_max: 335
position_endstop: -29



# ########################################
# # Driver y1 - Back Left - Motor 3
# ########################################

[tmc5160 stepper_y] 
##	Stepper Specific Pins
cs_pin: PC7
diag1_pin: ^!PG11

##	Generic Pins for SPI
spi_software_mosi_pin: ${constants.spi_software_mosi_pin_ab}
spi_software_miso_pin: ${constants.spi_software_miso_pin_ab}
spi_software_sclk_pin: ${constants.spi_software_sclk_pin_ab}

## Stepper/Driver homing settings
interpolate: ${constants.interpolate_ab}
run_current: ${constants.run_current_ab}
sense_resistor: ${constants.sense_resistor_ab}

##	Primary Stepper/Driver homing settings
home_current: ${constants.homing_current_main_ab}

##	Stepper Driver Control
driver_TBL: ${constants.driver_TBL_ab}
driver_TOFF: ${constants.driver_TOFF_ab}
driver_HSTRT: ${constants.driver_HSTRT_ab}
driver_HEND: ${constants.driver_HEND_ab}
driver_TPFD: ${constants.driver_TPFD_ab}

##	Primary Stepper/Driver homing settings
driver_SGT: 2  # -64 is most sensitive value, 63 is least sensitive


########################################
########################################
# Z Axis
########################################
########################################

########################################
# Stepper z (Front Right) - first postion
########################################

[stepper_z3]
## In Front Right - First Position
step_pin: skr:gpio14
dir_pin: !skr:gpio13
enable_pin: !skr:gpio15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32


########################################
# Driver z (Front Right) - first postion
########################################

[tmc2209 stepper_z3]
uart_pin: skr:gpio9
tx_pin: skr:gpio8
uart_address: 3
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

########################################
# Stepper z1 (Front Left) - second postion
########################################

[stepper_z]
## In Front Left - Second Position
step_pin: skr:gpio11
dir_pin: skr:gpio10
enable_pin: !skr:gpio12
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

position_min: -10
position_max: 310
homing_speed: 8
second_homing_speed: 3

# # Cartographer
endstop_pin: probe:z_virtual_endstop # use cartographer as virtual endstop
homing_retract_dist: 0 # cartographer needs this to be set to 0
# endstop_pin: PG10
# position_endstop:0

# ########################################
# # Driver z1 (Front Left) - second position
# ########################################

[tmc2209 stepper_z]
uart_pin: skr:gpio9
tx_pin: skr:gpio8
uart_address: 0
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# ########################################
# # Stepper z2 (Back Right) - third position
# ########################################

[stepper_z2]
## In Back Right - Third Position
step_pin: skr:gpio6
dir_pin: skr:gpio5
enable_pin: !skr:gpio7
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

########################################
# Drivers z2 (Back Right) - third position
########################################

[tmc2209 stepper_z2]
uart_pin: skr:gpio9
tx_pin: skr:gpio8
uart_address: 2
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# ########################################
# # Stepper z3 (Back Left) - fourth position
# ########################################

[stepper_z1]
## In Back Left - Fourth Position
step_pin: skr:gpio19
dir_pin: skr:gpio28
enable_pin: !skr:gpio2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

# ########################################
# # Drivers z3 (Back Left) - fourth position
# ########################################

[tmc2209 stepper_z1]
uart_pin: skr:gpio9
tx_pin: skr:gpio8
uart_address: 1
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
